<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleships</title>
  </head>
  <body>
    <div id="sidebar">
      <button id="play-game-btn">Play game</button>
      <div id="ships">
        <div id="ship1">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <div id="ship2">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
        <div id="ship3">
          <div class="cell"></div>
          <div class="cell"></div>
          <div class="cell"></div>
        </div>
      </div>
    </div>
    <div id="game-container">
      <h1>Battleships</h1>
      <div id="boards">
        <div>
          <h2>Your Board</h2>
          <div id="player-board"></div>
        </div>
        <div>
          <h2>Enemy Board</h2>
          <div id="enemy-board"></div>
        </div>
      </div>
      <div id="status"></div>
    </div>

    <script src="./index.js" type="module"></script>
  </body>
</html>
